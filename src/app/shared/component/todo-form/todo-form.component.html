<p>todo-form works!</p>


<div class="card">
    <div class="card-body">
        <h2>{{isInEditMode ? 'UPDATE TODO':'ADD TODO'}}</h2>
        <form #todoForm="ngForm" (ngSubmit)="onTodoSubmit(todoForm)">
            <div class="form-group">
                <label for="todoItem"><b>TODOITEM</b></label>
                 <input
                 name="todoItem"
                 required
                 ngModel
                 type="text" class="form-control">


            </div>

            <button 
            [disabled]="todoForm.invalid"
            type="submit"
            *ngIf="!isInEditMode"
            mat-raised-button color="primary" class="w-100">ADD TODO</button>

            <button 
            type="button"
              *ngIf="isInEditMode"
            mat-raised-button color="warn" class="w-100">UPDATE TODO</button>
        </form>
    </div>
</div>
